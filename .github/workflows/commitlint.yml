name: Commitlint

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  commitlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install commitlint
        run: npm install -D @commitlint/config-conventional @commitlint/cli

      - name: Run commitlint
        run: |
          echo "## Commitlint Results" >> $GITHUB_STEP_SUMMARY
          npx commitlint --from HEAD~1 --to HEAD --verbose --format gitlab >> $GITHUB_STEP_SUMMARY
